version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ishraqah-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ishraqah
      POSTGRES_USER: ishraqah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ishraqah_secure_2024}
    volumes:
      - ishraqah_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  ishraqah_pgdata:
